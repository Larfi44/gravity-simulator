name: Build and Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Init Tauri
        run: |
          if [ ! -d "src-tauri" ]; then
            cargo tauri init --app-name "Gravity Simulator" --window-title "Gravity Simulator" \
              --dev-url "http://localhost:1420" --before-dev-command "" \
              --before-build-command "" --frontend-dist "../dist" --ci
            cargo tauri android init
          fi

      - name: Build APK (release, arm64)
        run: ANDROID_ABIS=arm64-v8a cargo tauri android build --apk -- --release

      - name: Copy APK
        run: |
          mkdir -p downloads
          cp src-tauri/gen/android/app/build/outputs/apk/universal/release/app-universal-release-unsigned.apk downloads/gravity-simulator.apk || true

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: downloads/gravity-simulator.apk
          generate_release_notes: true
