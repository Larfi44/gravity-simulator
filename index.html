<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Gravity Simulator</title>
  </head>
  <body>
    <!-- Settings Menu -->
    <div id="settings-menu" class="settings-menu">
      <div class="settings-content">
        <h2>Gravity Simulator</h2>

        <!-- Preset Selection -->
        <div class="setting-group">
          <label for="preset-select">
            <span class="label-text">Environment Preset:</span>
            <div class="input-combo">
              <select id="preset-select" class="select-field">
                <option value="custom">Custom</option>
                <option value="earth">Earth (9.8 m/s²)</option>
                <option value="moon">Moon (1.62 m/s²)</option>
                <option value="mars">Mars (3.71 m/s²)</option>
                <option value="jupiter">Jupiter (24.79 m/s²)</option>
                <option value="zero">Zero Gravity</option>
              </select>
            </div>
          </label>
        </div>

        <div class="setting-group">
          <label for="gravity-input">
            <span class="label-text">Gravity Acceleration:</span>
            <div class="input-combo">
              <div class="number-input">
                <input
                  type="number"
                  id="gravity-input"
                  min="0.01"
                  step="0.1"
                  value="9.8"
                  class="number-field"
                />
                <span class="unit">m/s²</span>
              </div>
            </div>
          </label>
        </div>

        <div class="setting-group">
          <label for="height-input">
            <span class="label-text">Initial Height:</span>
            <div class="input-combo">
              <div class="number-input">
                <input
                  type="number"
                  id="height-input"
                  min="0.1"
                  step="1"
                  value="30"
                  class="number-field"
                />
                <span class="unit">meters</span>
              </div>
            </div>
          </label>
          <div class="slider-info">
            <div class="slider-labels">
              <span>1 m</span>
              <span>100 m</span>
              <span>200 m</span>
            </div>
          </div>
        </div>

        <div class="setting-group">
          <label for="mass-input">
            <span class="label-text">Object Mass:</span>
            <div class="input-combo">
              <div class="number-input">
                <input
                  type="number"
                  id="mass-input"
                  min="0.1"
                  step="0.1"
                  value="1.0"
                  class="number-field"
                />
                <span class="unit">kg</span>
              </div>
            </div>
          </label>
        </div>

        <div class="setting-group">
          <label for="bounciness-slider">
            <span class="label-text">Bounciness (Coefficient of Restitution): <span id="bounciness-value">0.70</span></span>
            <div class="input-combo">
              <input
                type="range"
                id="bounciness-slider"
                min="0"
                max="0.99"
                step="0.01"
                value="0.7"
                class="slider"
              />
            </div>
          </label>
        </div>

        <div class="setting-group">
          <label for="air-resistance-slider">
            <span class="label-text">Air Resistance (Drag Coefficient): <span id="air-resistance-value">0.00</span></span>
            <div class="input-combo">
              <input
                type="range"
                id="air-resistance-slider"
                min="0"
                max="1.0"
                step="0.01"
                value="0.0"
                class="slider"
              />
            </div>
          </label>
        </div>

        <div class="setting-group">
          <label for="time-scale-slider">
            <span class="label-text">Time Scale (Slow Motion): <span id="time-scale-value">1.0x</span></span>
            <div class="input-combo">
              <input
                type="range"
                id="time-scale-slider"
                min="0.1"
                max="2.0"
                step="0.1"
                value="1.0"
                class="slider"
              />
            </div>
          </label>
        </div>

        <div class="setting-group">
          <label class="checkbox-label">
            <input type="checkbox" id="show-trajectory" checked />
            <span class="label-text">Show Trajectory Prediction</span>
          </label>
        </div>

        <div class="setting-group">
          <label class="checkbox-label">
            <input type="checkbox" id="enable-sound" checked />
            <span class="label-text">Enable Sound Effects</span>
          </label>
        </div>

        <div class="button-group">
          <button id="start-btn" class="btn btn-primary">
            <span class="btn-icon">🚀</span>
            Start Simulation
          </button>
          <button id="export-btn" class="btn btn-secondary">
            <span class="btn-icon">💾</span>
            Export Settings
          </button>
        </div>
      </div>
    </div>

    <!-- Game Elements -->
    <div id="ground"></div>
    <div id="object"></div>

    <!-- Controls -->
    <div class="controls">
      <div class="control-group">
        <button id="pause-btn" class="btn-control">
          <span class="icon">⏸️</span>
          <span class="text">Pause</span>
        </button>
        <button id="again-btn" class="btn-control">
          <span class="icon">🔄</span>
          <span class="text">Again</span>
        </button>
        <button id="settings-btn" class="btn-control">
          <span class="icon">⚙️</span>
          <span class="text">Settings</span>
        </button>
      </div>

      <div class="stats">
        <div class="stat-item">
          <span class="stat-label">Status:</span>
          <span id="current-status" class="stat-value">Ready</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">Gravity:</span>
          <span id="current-gravity" class="stat-value">9.8 m/s²</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">Bounciness:</span>
          <span id="current-bounciness" class="stat-value">0.7</span>
        </div>
      </div>
    </div>

    <!-- Info Panel -->
    <div class="info">
      <div class="info-header">
        <h3>📈 Physics Data</h3>
      </div>
      <div class="info-content">
        <div class="data-row">
          <span class="data-label">Height:</span>
          <span id="height-display" class="data-value">30.00 m</span>
        </div>
        <div class="data-row">
          <span class="data-label">Velocity:</span>
          <span id="velocity" class="data-value">0.00 m/s</span>
        </div>
        <div class="data-row">
          <span class="data-label">Time:</span>
          <span id="time" class="data-value">0.00 s</span>
        </div>
        <div class="data-row">
          <span class="data-label">Bounce #:</span>
          <span id="bounce-number" class="data-value">0</span>
        </div>
        <div class="data-row">
          <span class="data-label">Mass:</span>
          <span id="mass-display" class="data-value">1.0 kg</span>
        </div>
        <div class="data-row">
          <span class="data-label">Kinetic Energy:</span>
          <span id="kinetic-energy" class="data-value">0.00 J</span>
        </div>
        <div class="data-row">
          <span class="data-label">Potential Energy:</span>
          <span id="potential-energy" class="data-value">294.00 J</span>
        </div>
        <div class="data-row">
          <span class="data-label">Total Energy:</span>
          <span id="total-energy" class="data-value">294.00 J</span>
        </div>
        <div class="data-row">
          <span class="data-label">Air Resistance:</span>
          <span id="air-resistance-display" class="data-value">0.00</span>
        </div>
      </div>

      <div class="input-focus-notice" id="input-focus-notice">
        <span class="notice-icon">⌨️</span>
        <span class="notice-text">Press Enter to confirm input</span>
      </div>
    </div>
  </body>
  <script src="script.js"></script>
</html>
